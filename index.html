<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>El peso de las palabras</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>

<body>

<div id="title">
  <h1>El peso de las palabras</h1>

  <p class="description">
    Speak continuously. Words remain suspended while you speak.
    When the voice stops, language loses its support and the letters fall.
  </p>
</div>


<div id="gui">

  <div class="instructions">
    <p><b>Instructions</b></p>
    <p>Click on the canvas to activate speech recognition.</p>
    <p>Speak continuously.</p>
    <p>Press <b>SPACE</b> to let the words fall.</p>
  </div>

  <label>
    Font Size
    <input type="range" id="sizeSlider" min="16" max="120" value="32">
  </label>

  <label>
    Font
    <select id="fontSelect">
      <option value="Arial">Arial</option>
      <option value="Georgia">Georgia</option>
      <option value="Courier New">Courier New</option>
      <option value="Verdana">Verdana</option>
      <option value="Times New Roman">Times New Roman</option>
    </select>
  </label>

</div>

<script src="sketch.js"></script>

</body>
</html>
